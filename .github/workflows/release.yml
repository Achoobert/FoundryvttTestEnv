# Release workflow for the FoundryvttTestEnv composite action.
#
# This repo is a composite GitHub Action (not a Foundry module), so there is no
# module.json/module.zip to publish. Instead, when a semver tag is pushed we:
#   1. Move a floating major tag (e.g. 0 / v0) to the released commit so
#      consumers can pin `uses: Achoobert/FoundryvttTestEnv@0`.
#   2. Create or update a GitHub Release for the exact tag.
#
# Push an exact tag to cut a release manually:
#   git tag 0.0.1 && git push origin 0.0.1
# Automatic releases from main use .github/workflows/auto-version.yml instead;
# tags pushed by GITHUB_TOKEN there do not retrigger this workflow.
# Consumers may then use @0.0.1 (exact) or @0 (latest 0.x).

name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version and major tags
        id: tags
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Not a tag ref (${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}); skipping release." >&2
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          major="${version%%.*}"
          if [ "${tag#v}" != "${tag}" ]; then
            major_tag="v${major}"
          else
            major_tag="${major}"
          fi
          {
            echo "is_tag=true"
            echo "tag=${tag}"
            echo "major_tag=${major_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Move floating major tag
        if: steps.tags.outputs.is_tag == 'true'
        run: |
          major="${{ steps.tags.outputs.major_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "${GITHUB_SHA}"
          git push -f origin "refs/tags/${major}"

      - name: Create or Update Release
        if: steps.tags.outputs.is_tag == 'true'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ steps.tags.outputs.tag }}
          tag: ${{ steps.tags.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Composite action release `${{ steps.tags.outputs.tag }}`.

            Pin in your workflow:
            ```yaml
            - uses: Achoobert/FoundryvttTestEnv@${{ steps.tags.outputs.tag }}
            ```
