# Auto-cut plain semver tags on push to main from conventional commit messages.
# Creates the version tag, moves floating major (e.g. 0), and publishes a GitHub Release.
# Does not retrigger release.yml (GITHUB_TOKEN tag pushes do not fire tag workflows).

name: Auto version release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Override bump type (leave empty to detect from commits on dispatch ref)
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: auto-version-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          BUMP_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || '' }}
        run: |
          set -euo pipefail

          latest="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$latest" ]; then
            latest="0.0.0"
          fi
          echo "Latest plain semver tag: $latest"

          major="${latest%%.*}"
          rest="${latest#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"

          bump="patch"
          if [ -n "$BUMP_OVERRIDE" ]; then
            bump="$BUMP_OVERRIDE"
            echo "Bump override (workflow_dispatch): $bump"
          else
            before="${{ github.event.before }}"
            sha="${{ github.sha }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              range="$sha"
            else
              range="${before}..${sha}"
            fi
            messages="$(git log --format=%B "$range" 2>/dev/null || git log -1 --format=%B)"
            echo "Commit messages in range:"
            echo "$messages"

            if echo "$messages" | grep -qE '(^|[[:space:]])BREAKING CHANGE' || \
               echo "$messages" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:'; then
              bump="major"
            elif echo "$messages" | grep -qE '^feat(\([^)]*\))?:'; then
              bump="minor"
            fi
            echo "Detected bump: $bump"
          fi

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unknown bump: $bump" >&2
              exit 1
              ;;
          esac

          next="${major}.${minor}.${patch}"
          echo "Next version: $next"

          if git rev-parse "refs/tags/${next}" >/dev/null 2>&1; then
            echo "Tag ${next} already exists; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "skip=false"
            echo "next=${next}"
            echo "major_tag=${major}"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tags
        if: steps.version.outputs.skip != 'true'
        run: |
          set -euo pipefail
          next="${{ steps.version.outputs.next }}"
          major="${{ steps.version.outputs.major_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "Release $next"
          git tag -f "$major" "${GITHUB_SHA}"
          git push origin "refs/tags/${next}"
          git push -f origin "refs/tags/${major}"

      - name: Create or Update Release
        if: steps.version.outputs.skip != 'true'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ steps.version.outputs.next }}
          tag: ${{ steps.version.outputs.next }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Composite action release `${{ steps.version.outputs.next }}` (auto-version from `main`).

            Pin in your workflow:
            ```yaml
            - uses: Achoobert/FoundryvttTestEnv@${{ steps.version.outputs.next }}
            ```

            Or float on major:
            ```yaml
            - uses: Achoobert/FoundryvttTestEnv@${{ steps.version.outputs.major_tag }}
            ```
